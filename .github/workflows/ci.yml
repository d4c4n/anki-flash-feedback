name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: pip install ruff mypy pytest
      - name: Lint (ruff)
        run: ruff check src/anki_flash_feedback/
      - name: Type check (mypy)
        run: mypy src/anki_flash_feedback/core.py
      - name: Test (pytest)
        run: python -m pytest
